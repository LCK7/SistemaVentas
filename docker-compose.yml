services:
  postgres:
    image: postgres:15-alpine
    container_name: sistema_ventas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sistema_ventas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sistema_ventas_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/sistema_ventas?schema=public"
      AUTH_SECRET: "mi-secreto-super-seguro-cambiar-en-produccion"
      AUTH_URL: "http://localhost:3000"
      NPM_CONFIG_STRICT_SSL: "false"
      NPM_CONFIG_REGISTRY: "http://registry.npmjs.org/"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./public:/app/public
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma db push && npm run dev"

volumes:
  postgres_data:
